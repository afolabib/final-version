name: Build & Push Agent Runtime

on:
  push:
    branches: [main]
    paths:
      - 'agent-runtime/**'
      - '.github/workflows/build-agent-runtime.yml'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

env:
  IMAGE: ghcr.io/afolabib/agent-runtime

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./agent-runtime
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Cache layers between builds for speed
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE }}:latest (${{ github.sha }})"
